server:
  port: 8080

spring:
  application:
    name: fitness-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitness_agent}
    username: ${SPRING_DATASOURCE_USERNAME:fitness}
    password: ${SPRING_DATASOURCE_PASSWORD:fitness_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SMTP_SSL:true}
          starttls:
            enable: ${SMTP_STARTTLS:false}

app:
  environment: ${APP_ENVIRONMENT:local}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-before-deploy-please}
    expires-minutes: ${JWT_EXPIRES_MINUTES:10080}
  verification:
    expires-minutes: ${VERIFICATION_EXPIRES_MINUTES:10}
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    chat-model: ${QWEN_CHAT_MODEL:qwen-plus}
    embedding-model: ${QWEN_EMBEDDING_MODEL:text-embedding-v4}
  rag:
    embedding-dimension: ${RAG_EMBEDDING_DIMENSION:1024}
    top-k: ${RAG_TOP_K:4}
    chunk-size: ${RAG_CHUNK_SIZE:900}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:120}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:}
